name: Publish container image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download verified image archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download v2.3.0-desktop-v2 --repo "${{ github.repository }}" --pattern komga-toolkit-image.tar

      - name: Load image
        run: docker load --input komga-toolkit-image.tar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish immutable and reference tags
        run: |
          docker tag komga-toolkit-web:2.3.0-desktop-v2 ghcr.io/hitman47/komga-toolkit-container:2.3.0-desktop-v2
          docker tag komga-toolkit-web:2.3.0-desktop-v2 ghcr.io/hitman47/komga-toolkit-container:desktop-v2
          docker push ghcr.io/hitman47/komga-toolkit-container:2.3.0-desktop-v2
          docker push ghcr.io/hitman47/komga-toolkit-container:desktop-v2
